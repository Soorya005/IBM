      - name: Trigger CodeChat sync endpoint
        env:
          CODECHAT_URL: ${{ vars.CODECHAT_URL }}
          CODECHAT_REPO_ID: ${{ vars.CODECHAT_REPO_ID }}
          CODECHAT_API_KEY: ${{ secrets.CODECHAT_API_KEY }}
        run: |
          set -e

          CLEAN_URL="$(printf '%s' "$CODECHAT_URL" | tr -d '\r\n\t ')"
          CLEAN_REPO_ID="$(printf '%s' "$CODECHAT_REPO_ID" | tr -d '\r\n\t ')"
          CLEAN_API_KEY="$(printf '%s' "$CODECHAT_API_KEY" | tr -d '\r\n\t ')"

          if [[ ! "$CLEAN_URL" =~ ^https?:// ]]; then
            echo "Invalid CODECHAT_URL: $CLEAN_URL"
            exit 1
          fi

          BASE_URL="${CLEAN_URL%/}"
          SYNC_URL="${BASE_URL}/repository/sync/${CLEAN_REPO_ID}?api_key=${CLEAN_API_KEY}"

          echo "Triggering CodeChat sync for repo_id=${CLEAN_REPO_ID}"
          echo "Using URL host: ${BASE_URL}"
          curl --fail-with-body --show-error --silent --request POST "$SYNC_URL"
          echo "Sync request accepted"
